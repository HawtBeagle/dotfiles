command_timeout = 2000

# Starship Configuration (Catppuccin Mocha - Right Format)

add_newline = true
palette = "catppuccin_mocha"

# Left side only has the prompt character
format = "  $character "

# All info moved to the right side
right_format = """
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$golang\
$java\
$cmd_duration"""

[character]
success_symbol = "[➜ : ](bold #a6e3a1)" 
error_symbol = "[➜ : ](bold #f38ba8)"   

[username]
show_always = true
style_user = "bold #cba6f7"
format = "[$user]($style) "

[directory]
truncation_length = 3
truncation_symbol = "…/"
style = "bold #89b4fa"
format = "in [$path]($style)[$read_only]($read_only_style) "

[git_branch]
symbol = " "
style = "bold #cba6f7"
format = "via [$symbol$branch]($style) "

[git_status]
style = "bold #f38ba8"
format = '([\[$all_status$ahead_behind\]]($style) )'

[cmd_duration]
min_time = 500
style = "bold #f9e2af"
format = "took [$duration]($style)"

[python]
symbol = " "
style = "bold #fab387"
format = "[$symbol($version )]($style)"

[nodejs]
symbol = " "
style = "bold #a6e3a1"
format = "[$symbol($version )]($style)"

