# -- general -------------------------------------------------------------------

# Change prefix to Ctrl+Space
set -g prefix C-Space
unbind C-b
bind C-Space send-prefix

set -g default-terminal "screen-256color"
setw -g xterm-keys on
set -s escape-time 10                     # faster command sequences
set -sg repeat-time 600                   # increase repeat timeout
set -s focus-events on

set -g history-limit 5000                 # boost history

# reload configuration
bind r source-file ~/.tmux.conf \; display "~/.tmux.conf sourced"

# edit configuration
bind e new-window -n "tmux.conf" "nvim ~/.tmux.conf && tmux source-file ~/.tmux.conf && tmux display \"Config reloaded\""

# -- display -------------------------------------------------------------------

set -g base-index 1           # start windows numbering at 1
setw -g pane-base-index 1     # start pane numbering at 1

setw -g automatic-rename on   # rename window to reflect current program
set -g renumber-windows on    # renumber windows when a window is closed

set -g set-titles on          # set terminal title

set -g display-panes-time 800 # slightly longer pane indicators display time
set -g display-time 1000      # slightly longer status messages display time

set -g status-interval 10     # redraw status line every 10 seconds
set -g status-position top

# -- theme ---------------------------------------------------------------------

# Catppuccin Mocha Rounded Pill Theme
set -g status-style bg=default,fg="#cdd6f4"
set -g status-left-length 100
set -g status-right-length 100

# Left: Session Name Rounded Pill
set -g status-left "#[fg=#89b4fa,bg=default]#[bg=#89b4fa,fg=#1e1e2e,bold]  #S #[fg=#89b4fa,bg=default] "

# Windows: Individual Rounded Pill Styles
set -g window-status-format "#[fg=#313244,bg=default]#[fg=#cdd6f4,bg=#313244] #I:#W #[fg=#313244,bg=default]"
set -g window-status-current-format "#[fg=#cba6f7,bg=default]#[fg=#1e1e2e,bg=#cba6f7,bold] #I:#W #[fg=#cba6f7,bg=default]"
set -g window-status-separator " "

# Right: Time, Date Rounded Pills
set -g status-right "#[fg=#fab387,bg=default]#[fg=#1e1e2e,bg=#fab387] 󰃰 %H:%M #[fg=#fab387,bg=default] #[fg=#89b4fa,bg=default]#[fg=#1e1e2e,bg=#89b4fa,bold] %Y-%m-%d #[fg=#89b4fa,bg=default]"

# Pane borders
set -g pane-border-style fg="#313244"
set -g pane-active-border-style fg="#89b4fa"

# activity
set -g monitor-activity off
set -g visual-activity off
set -g window-status-activity-style none

# -- navigation ----------------------------------------------------------------

# Seamless navigation between tmux and Neovim
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

# create session
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# window navigation
bind -r h previous-window
bind -r l next-window
bind Tab last-window
bind , command-prompt "rename-window '%%'"
bind T command-prompt -p "Pane title:" "select-pane -T '%%'"

# Swap windows (reorder)
bind -r < swap-window -t -1 \; previous-window
bind -r > swap-window -t +1 \; next-window

# -- mouse ---------------------------------------------------------------------

set -g mouse on

# -- copy mode -----------------------------------------------------------------

setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -n C-k send-keys -R \; clear-history
