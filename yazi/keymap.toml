[manager]
prepend_keymap = [
	{ on = [ "l" ], run = "plugin smart-enter", desc = "Enter directory or open file" },
	{ on = [ "h" ], run = "leave",             desc = "Leave directory" },

	-- Sorting
	{ on = [ "s", "m" ], run = "sort mtime --reverse=no", desc = "Sort by modified time" },
	{ on = [ "s", "M" ], run = "sort mtime --reverse",    desc = "Sort by modified time (reverse)" },
	{ on = [ "s", "s" ], run = "sort size --reverse=no",  desc = "Sort by size" },
	{ on = [ "s", "S" ], run = "sort size --reverse",     desc = "Sort by size (reverse)" },
	{ on = [ "s", "n" ], run = "sort natural --reverse=no", desc = "Sort naturally" },

	-- Navigation
	{ on = [ "z" ], run = "plugin zoxide", desc = "Jump to a directory using zoxide" },
	{ on = [ "Z" ], run = "plugin fzf",    desc = "Jump to a directory or reveal a file using fzf" },

	-- Search / Filter
	{ on = [ "f" ], run = "filter", desc = "Filter files (live)" },
	{ on = [ "F" ], run = "search fd", desc = "Search files using fd" },
	{ on = [ "S" ], run = "search rg", desc = "Search content using ripgrep" },
]
